<h2>Pet Catalog</h2>

<a routerLink="/create" class="btn-top">Add New Pet</a>


<div *ngIf="pets$ | async as pets; else loading">

  
  <div *ngIf="pets.length === 0">
    <p>No pets available.</p>
  </div>

  <div *ngFor="let pet of pets" class="card">
    <h3>{{ pet.name }}</h3>
    <img [src]="pet.imageUrl" width="150">
    <p>{{ pet.type }} - {{ pet.age }} years old</p>

    <a [routerLink]="['/pets', pet.id]" class="btn">Details</a>
  </div>

  
</div>

<ng-template #loading>
  <p>Loading pets...</p>
</ng-template>

<style>

  .btn-top {
  display: inline-block;
  text-align: center;
  margin-left: 46%;
  width: 8%;
  padding: 10px 16px;
  background-color: #333;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 500;
  transition: 0.2s ease-in-out;
  border: none;
  cursor: pointer;
}

.btn-top:hover {
  background-color: #555;
  transform: translateY(-1px);
}

  .card{
box-shadow: 20px;
display: inline-block;
width: 33%;
}
.card img {
  width: 60%;
  height: 180px;
  object-fit: cover;
}
</style>
